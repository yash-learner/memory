# gitleaks config for ~/memory
# Inherits the default gitleaks ruleset (AWS, GitHub, Slack, GCP, etc.)
# Add custom rules below as you discover patterns to block.

[extend]
useDefault = true

# ── Custom rules ─────────────────────────────────────────────────────────────
# Example template — uncomment and adapt:
#
# [[rules]]
# id = "internal-marker"
# description = "Lines marked INTERNAL: should never be committed"
# regex = '''(?i)^\s*INTERNAL:'''
# tags = ["custom", "policy"]

# ── Allowlist ────────────────────────────────────────────────────────────────
# Paths/patterns that are intentional examples (not real secrets).
[allowlist]
description = "Global allowlist for ~/memory"
paths = [
  '''\.gitleaks\.toml$''',
  '''\.audit/''',
]
# Allow obvious example tokens used in learning notes.
regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
  # Documentation example PATs (used in learnings/ to demonstrate gitleaks):
  '''ghp_AbCdEf1234567890AbCdEf1234567890AbCd''',
  '''AKIAZ7K9N4Q2L8M3P5R1''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYzFAKEKEY01''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYzREALPATTERN''',
]
